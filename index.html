<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Jack & Rose | K1 Travel Steamer</title>
  
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <script src="js/lock.js" defer></script>
  <script src="js/images.js" defer></script>
  <script src="js/app.js" defer></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'IBM Plex Mono', monospace; }</style>
</head>
<body>
  <input type="checkbox" id="toggle-details" class="css-toggle">
  <input type="checkbox" id="toggle-policies" class="css-toggle">
  <input type="checkbox" id="toggle-checkout" class="css-toggle">
  
  <script>
    const CONFIG = { storeName: "JACK & ROSE", productName: "K1 TRAVEL STEAMER", productPrice: "$65.00 USD" };
  </script>

  <header class="app-header">
    <a class="logo" href="#" id="ui-store-brand">STORE</a>
    <div>
      <h1 class="product-title" id="ui-product-title">PRODUCT</h1>
      <div class="product-price" id="ui-product-price">$0.00</div>
    </div>
  </header>

  <main class="app-main">
    <div class="gallery-wrapper">
      <div class="main-image-display" id="js-gallery-container"></div>
      <div class="absolute top-1/2 -left-24 z-50 -translate-y-1/2 max-[1024px]:left-2">
        <button type="button" class="cursor-pointer text-black" id="js-prev-btn">
          <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" class="size-8" width="1em" height="1em" viewBox="0 0 24 24"><g transform="rotate(-90 12 12)"><path fill="currentColor" d="M11.29 8.71L6.7 13.3a.996.996 0 1 0 1.41 1.41L12 10.83l3.88 3.88a.996.996 0 1 0 1.41-1.41L12.7 8.71a.996.996 0 0 0-1.41 0"></path></g></svg>
        </button>
      </div>
      <div class="absolute top-1/2 -right-24 z-50 -translate-y-1/2 max-[1024px]:right-2">
        <button type="button" class="cursor-pointer text-black" id="js-next-btn">
          <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" class="size-8" width="1em" height="1em" viewBox="0 0 24 24"><g transform="rotate(90 12 12)"><path fill="currentColor" d="M11.29 8.71L6.7 13.3a.996.996 0 1 0 1.41 1.41L12 10.83l3.88 3.88a.996.996 0 1 0 1.41-1.41L12.7 8.71a.996.996 0 0 0-1.41 0"></path></g></svg>
        </button>
      </div>
    </div>
    <div class="gallery-counter" id="js-gallery-counter"></div>
  </main>

  <footer class="app-bottom-bar">
    <div class="bottom-left"><label for="toggle-details" class="ui-link">+ Details</label><label for="toggle-policies" class="ui-link">+ Policies</label></div>
    <div class="bottom-center">© 2026 JACK & ROSE</div>
    <div class="bottom-right">
      <div class="qty-container"><button type="button" class="qty-btn" id="qty-minus">−</button><input type="text" id="ui-qty-input" class="qty-input" value="1" readonly><button type="button" class="qty-btn" id="qty-plus">+</button></div>
      <label for="toggle-checkout" class="btn-buy" id="open-modal-btn">Buy Now</label>
    </div>
  </footer>

  <div class="yzy-overlay" id="modal-details">
    <label for="toggle-details" class="overlay-bg-close"></label>
    <div class="yzy-modal-body">
      <label for="toggle-details" class="yzy-modal-close"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 2L14 14M2 14L14 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg></label>
      <h2 class="modal-title">Product Specifications</h2>
      <div class="modal-text-block"><h4>Voltage</h4><p>Pioneered 100V-220V automatic smart adaptation layers.</p></div>
    </div>
  </div>

  <div class="yzy-overlay" id="modal-policies">
    <label for="toggle-policies" class="overlay-bg-close"></label>
    <div class="yzy-modal-body">
      <label for="toggle-policies" class="yzy-modal-close"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 2L14 14M2 14L14 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg></label>
      <h2 class="modal-title">Policies</h2>
      <div class="modal-text-block"><h4>Terms</h4><p>Custom allocations handled on terminal parameters.</p></div>
    </div>
  </div>

  <div class="yzy-overlay" id="modal-checkout">
    <label for="toggle-checkout" class="overlay-bg-close"></label>
    <div class="yzy-modal-body-checkout">
      <label for="toggle-checkout" class="yzy-modal-close"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 2L14 14M2 14L14 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg></label>
      <iframe src="about:blank" id="js-checkout-iframe" class="w-full h-full border-none"></iframe>
    </div>
  </div>
</body>
</html>
